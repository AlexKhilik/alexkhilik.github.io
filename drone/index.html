<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clumsy Drone</title>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f9f9f9;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
        }
        h1 {
            color: #1a1a1a;
            margin-bottom: 5px;
        }
        .tagline {
            font-size: 1.2em;
            color: #555;
            margin-bottom: 30px;
            font-weight: 500;
        }
        .description {
            text-align: left;
            margin-bottom: 30px;
        }
        .features-list {
            text-align: left;
            list-style: none;
            padding: 0;
        }
        .features-list li {
            margin-bottom: 10px;
        }
        .store-buttons {
            margin: 40px 0;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .store-buttons img {
            height: 60px; /* Размер кнопок */
            transition: transform 0.2s;
        }
        .store-buttons img:hover {
            transform: scale(1.05);
        }
        .support-section {
            margin-top: 50px;
            padding-top: 30px;
            border-top: 1px solid #eee;
        }
        .support-email {
            font-size: 1.2em;
            font-weight: bold;
            color: #0066cc;
            text-decoration: none;
        }
        .support-email:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Clumsy Drone</h1>
        <div class="tagline">Subtitle Placeholder</div>

        <div class="description">
            Description Placeholder
        </div>

        <div class="store-buttons">
            <a href="#" target="_blank">
                <img src="appstore_banner.svg" alt="Download on the App Store">
            </a>
            
            <a href="#" target="_blank">
                <img src="google_play_banner.png" alt="Get it on Google Play">
            </a>
        </div>

        <div class="support-section">
            <h2>Support</h2>
            <p>If you have any questions, bug reports, or need help with the game, please contact us:</p>
            <a href="mailto:alexkhilik@gmail.com" class="support-email">alexkhilik@gmail.comm</a>
        </div>
        <div style="margin-top: 50px; padding-top: 20px; border-top: 1px solid #eee; font-size: 0.9em;">
            <a href="PrivacyPolicy.html" style="color: #555; text-decoration: none;">Privacy Policy</a>
        </div>
    </div>

</body>
</html>
